  <script>
    function doLogin(event) {
      event.preventDefault();
      var btn = document.getElementById('login-btn');
      var errEl = document.getElementById('login-error');
      var username = document.getElementById('login-username').value.trim();
      var password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';
      errEl.classList.add('hidden');

      google.script.run
        .withSuccessHandler(function(resp) {
          btn.disabled = false;
          btn.innerHTML = 'Masuk';
          if (resp.status === 'success') {
            sessionStorage.setItem('user_role', resp.role);
            sessionStorage.setItem('user_name', resp.name);
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('login-overlay').classList.remove('flex');
            applyRoleFilter();
            switchMenu('sales-dashboard');
          } else {
            errEl.textContent = resp.message;
            errEl.classList.remove('hidden');
          }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.innerHTML = 'Masuk';
          errEl.textContent = 'Gagal terhubung ke server: ' + err.message;
          errEl.classList.remove('hidden');
        })
        .loginUser(username, password);
      return false;
    }

    function doLogout() {
      sessionStorage.removeItem('user_role');
      sessionStorage.removeItem('user_name');
      location.reload();
    }

    function applyRoleFilter() {
      var role = sessionStorage.getItem('user_role') || 'admin';
      document.getElementById('user-name').textContent = sessionStorage.getItem('user_name') || 'User';
      document.getElementById('user-role').textContent = role === 'super_admin' ? 'Super Admin' : 'Admin';

      document.querySelectorAll('nav a[data-role]').forEach(function(el) {
        if (role === 'super_admin') {
          el.classList.remove('hidden');
        } else {
          el.classList.add('hidden');
        }
      });

      if (role !== 'super_admin') switchMenu('distribusi');
    }

    (function() {
      var role = sessionStorage.getItem('user_role');
      if (role) {
        document.getElementById('login-overlay').classList.add('hidden');
        document.getElementById('login-overlay').classList.remove('flex');
        applyRoleFilter();
      }
    })();
  </script>
